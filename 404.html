<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Diana Chalakova</title>
<meta name="description" content="That page doesn't exist — head back to Diana Chalakova's portfolio." />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/base.css" />
<style>
  :root { --paper: #ffffff; }
  body::before { display: none; }
  .nf {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 40px 24px; gap: 4px;
  }
  .nf .mark { width: 56px; height: 56px; margin-bottom: 22px; }
  .nf h1 {
    font-family: var(--display); font-weight: 900; letter-spacing: -0.03em;
    font-size: clamp(96px, 22vw, 220px); line-height: 0.9; margin: 0; color: var(--ink);
  }
  .nf p {
    font-size: 18px; color: var(--ink-soft); margin: 14px 0 32px; max-width: 30ch;
    text-wrap: pretty;
  }
  .nf .home {
    font-family: var(--mono); font-size: 14px; letter-spacing: 0.02em;
    border: 1.5px solid var(--ink); border-radius: 999px; padding: 12px 22px;
    color: var(--ink); transition: background .2s ease, color .2s ease;
  }
  .nf .home:hover { background: var(--ink); color: #fff; }
</style>
</head>
<bodyclass="has-cursor">
<div id="cursor"></div>
  <div class="nf">
    <svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="24" cy="12" rx="7" ry="11" fill="#E1462C" transform="rotate(0 24 24)" />
      <ellipse cx="24" cy="12" rx="7" ry="11" fill="#E1462C" transform="rotate(72 24 24)" />
      <ellipse cx="24" cy="12" rx="7" ry="11" fill="#E1462C" transform="rotate(144 24 24)" />
      <ellipse cx="24" cy="12" rx="7" ry="11" fill="#E1462C" transform="rotate(216 24 24)" />
      <ellipse cx="24" cy="12" rx="7" ry="11" fill="#E1462C" transform="rotate(288 24 24)" />
      <circle cx="24" cy="24" r="6.5" fill="#FFD23F" />
    </svg>
    <h1>404</h1>
    <p>This page wandered off. Let's get you back to the work.</p>
    <a class="home" href="index.html">← Back to portfolio</a>
  </div>
  <script>
    (function() {
      var c = document.getElementById('cursor');
      if (!c) return;
      document.addEventListener('mousemove', function(e) {
        c.style.left = e.clientX + 'px';
        c.style.top  = e.clientY + 'px';
      });
      var hover = 'a,button,input,select,textarea,[role="button"],[tabindex]';
      document.addEventListener('mouseover', function(e) {
        if (e.target.closest(hover)) c.classList.add('hover');
      });
      document.addEventListener('mouseout', function(e) {
        if (e.target.closest(hover)) c.classList.remove('hover');
      });
    })();
  </script>
</body>
</html>
